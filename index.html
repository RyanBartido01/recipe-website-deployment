<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Log-in Form</title>
</head>
<style>
    .col{
        margin: auto;
        margin-top: 330px;
        height: 350px;
        width: 400px;
        padding: 45px;
        background-color: rgb(210, 210, 210);
        border: solid gold;
        opacity: 90%;
    }
    .input{
        width: 80%;
    }
    .button1{
        color: rgb(125, 255, 245); 
        background-color: rgb(255, 220, 105);
        margin-left: 20%;
    }
    .button2{
        color: rgb(125, 255, 245);
        background-color: rgb(255, 220, 105);
        margin-left: 10%;
    }
    body{
        background-image: url("Sam_HSR.webp");
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
    }
</style>
<body>
    <div>
        <main>
            <form>
                <div class="col">
                    <label>Email</label>
                    <input type="text" class="form-control" placeholder="Enter Email" name="email">
                    <br>
                    <label>Password</label>
                    <input type="text" class="form-control" placeholder="Enter Password" name="pswd">
                    <br>
                    <button type="submit" class="button1" ><a href="./Recipe Website(incomplete).html">Log in</a></button>
                    <button type="submit" class="button2"><a href="./Boostrap Sign-up Form.html">Sign up</a></button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
