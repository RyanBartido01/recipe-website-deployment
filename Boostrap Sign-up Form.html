<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Sign-Up Forms</title>
    <style>
    .div1 {
        background-color: aliceblue;
        border: solid navy;
        width: 700px;
        margin: auto;
    }
    #container {
        background-color: aliceblue;
        border: solid navy;
        width: 700px;
        margin: auto;
    }
    #submit{
        color:aliceblue;
        background-color: navy;
    }
    #reset{
        color:aliceblue;
        background-color: navy;
    }
    </style>
</head>
<body>
    
    <div class="div1">
        <h1 align="center">Cookery Sign Up</h1>
        <p class="h2" align="center">Profile Registration</p>
    </div><br>
    
    <div id="container">
        
        <form action="./index.html">
            
            <div class="mt-5">
                <p class="h2" style="margin: 20px;" align="center"><b>Create Account</b></p>
            </div>
            
            <div class="container mt-3">
                <div class="row">
                    <div class="col">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" class="form-control" placeholder="Enter First Name" name="fname" required>
                    </div>
                    <div class="col">
                        <label for="lname">Surname</label>
                        <input type="text" class="form-control" placeholder=" Enter Surname" name="surname">
                    </div>
                </div>
            </div>
            
            <div class="container mt-3">
                <div class="row">
                    <div class="col">
                        <label for="email">Email</label>
                        <input type="text" class="form-control" placeholder="Enter Email" name="email" required>
                    </div>
                    <div class="col">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" placeholder="Enter Password" name="pswd">
                    </div>
                </div>
            </div>
            
            <div class="container mt-3">
                <div class="row">
                    <div class="col">
                        <label for="bday">Date of Birth:</label>
                        <input type="date" id="bday" class="form-control" name="bday" required>
                    </div>
                    <div class="col">
                        <label for="phone">Phone Number:</label>
                        <input type="tel" class="form-control" placeholder="555-VICK" name="phone">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Choose your difficulty</label>
                
                <div class="form-control">
                    <input type="radio" name="level" value="Beginner"><label class="inline-group">Beginner</label><br>
                    <input type="radio" name="level" value="Intermediate"><label class="inline-group">Intermediate</label><br>
                    <input type="radio" name="level" value="Professional"><label class="inline-group">Professional</label><br>
                </div>
            </div>

            <div class="form-group pt-3">
                <label for="bio">Biography</label><br>
                <textarea class="form-control" id="bio" name="bio" rows="5">Provide a short write-up here</textarea>
            </div><br>

            <button type="submit" id="submit" class="btn btn-primary">Register</button>
            <button type="reset" id="reset" class="btn btn-primary">Clear All</button><br>
        
        </form>
    
    </div>
</body>
</html>
